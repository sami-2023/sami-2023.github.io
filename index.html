    body {
      font-family: Arial, sans-serif;
      background: #f0f8ff;

      flex-direction: column;
      overflow: hidden;
    }

    /* === HEADER === */
    .header {
      background: linear-gradient(90deg, #ff0a00, #26ff00);
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .logo img {
       width: 45px;
       height: 45px; 
       background: white; 
       color: #ff0a00; 
       border-radius: 50%; 
       display: flex; 
       align-items: center; 
       justify-content: center;

       font-weight: bold; 
       flex-shrink: 0; 
      }
    .title-box { 
      flex-grow: 1; 
      text-align: center;

    .site-name { 
      font-size: 22px; 
      font-weight: bold;
     }
    .tagline { 
      font-size: 11px; 
      opacity: 0.9; 
    }

    /* === POINTS BAR === */
    .points-bar {
      background: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin: 10px auto;
      width: 92%;
      max-width: 500px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      font-weight: bold;
    }

    #currentPoints { color: #ff0a00; font-size: 14px; white-space: nowrap; }

    .progress-container {
      flex-grow: 1;
      height: 12px;
      background: #e9ecef;
      border-radius: 6px;
      margin: 0 15px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #26ff00, #ff0a00);
      width: 0%;
      border-radius: 6px;
      transition: width 0.6s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shine 2s infinite;
    }

    @keyframes shine {

      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .pts-target { color: #26ff00; font-size: 14px; white-space: nowrap; }

    /* === FEED === */
    .posts-grid {
      flex-grow: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 140px !important;
    }
    .posts-grid::-webkit-scrollbar { display: none; }

    .post {
      height: calc(100vh - 250px);
      
      display: flex;
      flex-direction: column;
      background: white;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }

    .post-image {
      flex-grow: 1;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .responsive-media {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .post-details { padding: 10px 15px; flex-shrink: 0; }
    .post-user { font-weight: bold; color: #ff0a00; font-size: 15px; margin-bottom: 5px; }
    .interaction-bar { display: flex; align-items: center; gap: 15px; }
    .interaction-bar i { font-size: 24px; cursor: pointer; transition: transform 0.1s ease; }
    .interaction-bar i:active { transform: scale(1.2); }

    /* === ADS & BADGES === */
    @keyframes earnedPop {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .earned-badge-style {
      display: block !important;
      animation: earnedPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;

    }
    /* === FOOTER & AD BANNER === */
    .ad-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;

      background: white;

      border-top: 1px solid #ddd;

      align-items: center;

}

<script>
(async function() {
    // 1. STATE & CONFIG
    let _lastPointAdd = 0;
    const _COOLDOWN = 3000;
    const sdk = new Appwrite.Client();
    sdk.setEndpoint('https://fra.cloud.appwrite.io/v1').setProject('69930a880011dec1e960');

    const account = new Appwrite.Account(sdk);
    const databases = new Appwrite.Databases(sdk);

    const DB_ID = '69930af300230e5efc4d';
    const PROFILES_ID = 'profiles';
    const POSTS_ID = 'posts';
    const LIKES_ID = 'likes';
    const COMMENTS_ID = 'comments';

    let currentUser = null;
    let cachedPosts = [];
    let isProcessingLike = false;

    // 2. MAIN INITIALIZATION
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const secret = urlParams.get('secret');
        const userId = urlParams.get('userId');

        // A. Handshake Verification
        if (secret && userId) {
            try {
                await account.updateVerification(userId, secret);
                console.log("Email verified successfully!");
            } catch (err) {
                console.error("Verification error:", err.message);
            }
        }

        // B. Session Check
        try {
            currentUser = await account.get();
            console.log("Logged in user:", currentUser.$id);
        } catch (err) {
            console.log("No session, redirecting...");
            window.location.href = "signup.html";
            return;
        }

        // C. Enforce Verification View
        if (!currentUser.emailVerification) {
            document.body.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; padding:20px; font-family:sans-serif; background:#fff; color:#000;">
                    <h2 style="color:#ff0a00;">Verification Required</h2>
                    <p>Please check your Gmail and click the verification link to access the home page.</p>
                    <button onclick="location.reload()" style="padding:12px 24px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">I've Verified, Let Me In!</button>
                </div>`;
            return; 
        }

        // D. Load Data
        await loadFeedData();
        await loadProfile();
        renderFeed();
        loadFooterAd();
    }

    // 3. DATA LOADING FUNCTIONS
    async function loadFeedData() {
        try {
            const response = await databases.listDocuments(DB_ID, POSTS_ID);
            let allPosts = response.documents;

            const userPosts = allPosts
                .filter(p => p.user_id === currentUser.$id)
                .sort((a, b) => new Date(b.$createdAt) - new Date(a.$createdAt));
            
            const latestUserPost = userPosts[0];
            let otherPosts = latestUserPost 
                ? allPosts.filter(p => p.$id !== latestUserPost.$id) 
                : allPosts;

            otherPosts.sort(() => Math.random() - 0.5);
            cachedPosts = latestUserPost ? [latestUserPost, ...otherPosts] : otherPosts;
        } catch (err) {
            console.error("Fetch error:", err);
        }
    }

    async function loadProfile() {
        if (!currentUser) return;
        try {
            const profile = await databases.getDocument(DB_ID, PROFILES_ID, currentUser.$id);
            const currentPoints = profile.points || 0;
            const ptsDisplay = document.getElementById("currentPoints");
            if (ptsDisplay) ptsDisplay.textContent = currentPoints + " Points";
            
            const fill = document.getElementById("progressFill");
            if(fill) fill.style.width = Math.min((currentPoints / 1000) * 100, 100) + "%";
        } catch (e) { console.log("Profile load error:", e); }
    }

    // 4. RENDER & UI
    async function renderFeed() {
        const grid = document.getElementById("postsGrid");
        if (!grid || cachedPosts.length === 0) return;

        try {
            const likesRes = await databases.listDocuments(DB_ID, LIKES_ID, [
                Appwrite.Query.equal('user_id', currentUser.$id)
            ]);
            const myLikedIds = likesRes.documents.map(l => l.post_id);

            let html = "";
            cachedPosts.forEach((post, index) => {
                const isLiked = myLikedIds.includes(post.$id);
                const userPfp = post.pfp || `https://api.dicebear.com/7.x/avataaars/svg?seed=${post.user_id}`;
                const mediaHtml = post.type === "video" 
                    ? `<div style="position:relative; width:100%; height:100%; background:black;">
                        <video id="vid-${post.$id}" src="${post.url}" class="user-video" loop muted autoplay playsinline style="width:100%; height:100%; object-fit:contain;"></video>
                        <button onclick="togglePostSound('${post.$id}', event)" style="position:absolute; bottom:15px; right:15px; background:rgba(0,0,0,0.6); border-radius:50%; width:35px; height:35px; color:white; border:none; cursor:pointer;">
                            <i id="icon-${post.$id}" class="fa-solid fa-volume-xmark"></i>
                        </button>
                       </div>`
                    : `<img src="${post.url}" class="responsive-media">`;

                html += `
                <div class="post" id="post-${post.$id}">
                    <div class="post-image" ondblclick="handleLike('${post.$id}', this.parentElement.querySelector('.fa-fire'))">
                        ${mediaHtml}
                    </div>
                    <div class="post-details">
                        <div style="display:flex; align-items:center; margin-bottom:10px;">
                            <img src="${userPfp}" style="width:38px; height:38px; border-radius:50%; margin-right:12px; border:2px solid #26ff00;">
                            <div>
                                <div class="post-user">@${post.username || 'User'}</div>
                                <div class="post-caption">${post.caption || ''}</div>
                            </div>
                        </div>
                        <div class="interaction-bar">
                            <i class="fa-solid fa-fire" style="color:${isLiked ? '#ff4500' : '#ccc'}; cursor:pointer; font-size:22px;" onclick="handleLike('${post.$id}', this)"></i>
                            <i class="fa-regular fa-comment" style="margin-left:15px; cursor:pointer; font-size:22px;" onclick="openComments('${post.$id}')"></i>
                            <span class="like-count-label" style="float:right; font-weight:bold;">${post.likes || 0} Likes</span>
                        </div>
                        <div id="preview-${post.$id}" class="comment-preview"></div>
                    </div>
                </div>`;

                // Ad injection every 3 posts
                if ((index + 1) % 3 === 0) {
                    html += `
                    <div class="post ad-post" data-ad-index="${index}" data-earned="false" style="background:#111; border:2px solid #333;">
                        <div style="padding:10px; font-size:11px; color:#fff; display:flex; justify-content:space-between;">
                            <span>SPONSORED REWARD</span>
                            <span style="color:#26ff00; font-weight:bold;"><i class="fa-solid fa-clock"></i> <span id="timer-${index}">15s</span></span>
                        </div>
                        <div id="ad-provider-container-${index}" style="min-height:250px; display:flex; align-items:center; justify-content:center;">LOADING AD...</div>
                        <div id="earnedBadge${index}" style="display:none; text-align:center; background:#26ff00; color:#000; padding:8px; font-weight:bold;">✓ +2 POINTS EARNED</div>
                    </div>`;
                }
            });

            grid.innerHTML = html;
            document.querySelectorAll('.user-video').forEach(vid => videoObserver.observe(vid));
            document.querySelectorAll('[id^="ad-provider-container-"]').forEach(div => injectPartnerAd(div.id));
            document.querySelectorAll('.ad-post').forEach(ad => adObserver.observe(ad));
            loadPreviews();
        } catch (err) { console.error("Render error:", err); }
    }

    // 5. AD & POINTS LOGIC
    const adObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const target = entry.target;
            const idx = target.getAttribute('data-ad-index');
            const timerSpan = document.getElementById(`timer-${idx}`);
            
            if (entry.isIntersecting && target.getAttribute('data-earned') !== 'true') {
                let timeLeft = 15;
                if(target.dataset.intervalId) clearInterval(target.dataset.intervalId);
                const intervalId = setInterval(() => {
                    timeLeft--;
                    if (timerSpan) timerSpan.innerText = timeLeft + "s";
                    if (timeLeft <= 0) {
                        clearInterval(intervalId);
                        givePoints(target, 2, "Gold_Secure_88x");
                    }
                }, 1000);
                target.dataset.intervalId = intervalId;
            } else if (!entry.isIntersecting && target.dataset.intervalId) {
                clearInterval(target.dataset.intervalId);
                delete target.dataset.intervalId;
            }
        });
    }, { threshold: 0.8 });

    async function givePoints(element, amount, secretKey) {
        if (secretKey !== "Gold_Secure_88x" || Date.now() - _lastPointAdd < _COOLDOWN) return;
        if (!element || element.getAttribute('data-earned') === 'true') return;

        element.setAttribute('data-earned', 'true');
        _lastPointAdd = Date.now();

        try {
            const profile = await databases.getDocument(DB_ID, PROFILES_ID, currentUser.$id);
            const newTotal = (profile.points || 0) + amount;
            await databases.updateDocument(DB_ID, PROFILES_ID, currentUser.$id, { points: newTotal });
            
            const ptsDisplay = document.getElementById("currentPoints");
            if (ptsDisplay) ptsDisplay.textContent = newTotal + " Points";
            
            const idx = element.getAttribute('data-ad-index');
            const badge = document.getElementById(`earnedBadge${idx}`);
            const timer = document.getElementById(`timer-${idx}`);
            if (badge) badge.style.display = 'block';
            if (timer) timer.innerText = "DONE";
            element.style.borderColor = "#26ff00";
        } catch (err) {
            element.setAttribute('data-earned', 'false');
        }
    }

    // 6. GLOBAL HELPERS
    window.handleLike = async function(postId, iconElement) {
        if (!currentUser || isProcessingLike) return;
        isProcessingLike = true;
        try {
            const isLiked = iconElement.style.color === "rgb(255, 69, 0)";
            iconElement.style.color = isLiked ? "#ccc" : "#ff4500";
            // Add Appwrite update logic here (omitted for brevity but keep your existing logic)
        } finally { isProcessingLike = false; }
    };

    window.togglePostSound = function(postId, event) {
        event.stopPropagation();
        const video = document.getElementById(`vid-${postId}`);
        const icon = document.getElementById(`icon-${postId}`);
        if (video) {
            video.muted = !video.muted;
            icon.className = video.muted ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
        }
    };

    const videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.play().catch(()=>{});
            else entry.target.pause();
        });
    }, { threshold: 0.3 });

    // --- EXPOSE TO GLOBAL SCOPE ---
    // This allows your HTML onclick events to work
    window.openComments = openComments;
    window.closeComments = closeComments;
    window.submitComment = submitComment;
    window.handleLike = handleLike;
    window.togglePostSound = togglePostSound;
    window.toggleSettingsMenu = toggleSettingsMenu;
    
    // Ensure these helper functions are also accessible if called dynamically
    window.injectPartnerAd = injectPartnerAd; 
    window.loadFooterAd = loadFooterAd;

   

    // 7. START
    init();

})();
</script>
