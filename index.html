    .header {
      background: linear-gradient(90deg, #ff0a00, #26ff00);
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;

    .logo img {
       width: 45px;

     }
    .tagline {

    /* === POINTS BAR === */
    .points-bar {
      background: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin: 10px auto;
      width: 92%;
      max-width: 500px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      font-weight: bold;
    }

    #currentPoints { color: #ff0a00; font-size: 14px; white-space: nowrap; }

    .progress-container {
      flex-grow: 1;
      height: 12px;
      background: #e9ecef;
      border-radius: 6px;
      margin: 0 15px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #26ff00, #ff0a00);
      width: 0%;
      border-radius: 6px;
      transition: width 0.6s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shine 2s infinite;
    }

    @keyframes shine {

      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .pts-target { color: #26ff00; font-size: 14px; white-space: nowrap; }

    /* === FEED === */
    .posts-grid {
      flex-grow: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 140px !important;
    }
    .posts-grid::-webkit-scrollbar { display: none; }

    .post {
      height: calc(100vh - 250px);
      
      display: flex;
      flex-direction: column;
      background: white;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }

    .post-image {
      flex-grow: 1;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .responsive-media {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .post-details { padding: 10px 15px; flex-shrink: 0; }
    .post-user { font-weight: bold; color: #ff0a00; font-size: 15px; margin-bottom: 5px; }
    .interaction-bar { display: flex; align-items: center; gap: 15px; }
    .interaction-bar i { font-size: 24px; cursor: pointer; transition: transform 0.1s ease; }
    .interaction-bar i:active { transform: scale(1.2); }

    /* === ADS & BADGES === */
    @keyframes earnedPop {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .earned-badge-style {
      display: block !important;
      animation: earnedPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;

    }
    /* === FOOTER & AD BANNER === */
    .ad-banner {

<script>

    //if (!currentUser.emailVerification) {
        document.body.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; padding:20px; font-family:sans-serif;">

    // 5. LOAD APP CONTENT (Only reached if verified)
    async function init() {
   try {
    const response = await databases.listDocuments(DB_ID, POSTS_ID);
    let allPosts = response.documents;

    // 1. Find the user's most recent post
    const userPosts = allPosts
        .filter(p => p.user_id === currentUser.$id)
        .sort((a, b) => new Date(b.$createdAt) - new Date(a.$createdAt));
    
    const latestUserPost = userPosts[0];

    // 2. Remove that specific post from the main pool so it doesn't appear twice
    let otherPosts = latestUserPost 
        ? allPosts.filter(p => p.$id !== latestUserPost.$id) 
        : allPosts;

    // 3. Shuffle only the "other" posts
    otherPosts.sort(() => Math.random() - 0.5);

    // 4. Combine: User's newest post goes first, followed by the shuffled rest
    cachedPosts = latestUserPost ? [latestUserPost, ...otherPosts] : otherPosts;

} 

catch (err) {
    console.error("Fetch error:", err);
}

    loadProfile();
    renderFeed();
    injectBottomBannerAd("container-footer-ad", "bde480069c84a2d4c2af25a3d057ea0a");
}

    // --- BOTTOM BANNER FUNCTION ---
    function injectBottomBannerAd(containerId, adId) {
        const container = document.getElementById(containerId);
        if(!container) {
            console.error("Ad container not found: " + containerId);
            return;
        }
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.async = true;
        // Using the Adsterra link format you provided
        script.src = `https://pl28777537.effectivegatecpm.com/${adId}/invoke.js`;
        container.appendChild(script);
    }

    // --- LOAD PROFILE ---
    async function loadProfile() {
        try {
            const profile = await databases.getDocument(DB_ID, PROFILES_ID, currentUser.$id);
            const currentPoints = profile.points || 0;
            
            const pointsElement = document.getElementById("currentPoints");
            if (pointsElement) pointsElement.textContent = currentPoints + " Points";
            
            const fill = document.getElementById("progressFill");
            if(fill) fill.style.width = Math.min((currentPoints / 1000) * 100, 100) + "%";
        } catch (e) { 
            console.log("Profile load error:", e); 
        }
    }

  // 4. LIKES LOGIC (APPWRITE VERSION)
    async function handleLike(postId, iconElement) {
        if (!currentUser || isProcessingLike) return; 
        isProcessingLike = true;

        const countSpan = iconElement.parentElement.querySelector('.like-count-label');
        
        // Better way to check if liked: check a class or a specific hex
        const isCurrentlyLiked = iconElement.style.color === "rgb(255, 69, 0)" || 
                                 iconElement.style.color === "#ff4500" || 
                                 iconElement.classList.contains('active-like'); 

        let currentLikes = parseInt(countSpan.textContent) || 0;
        let newLikeCount = isCurrentlyLiked ? Math.max(0, currentLikes - 1) : currentLikes + 1;

        // UI Update (Fast)
        iconElement.style.color = isCurrentlyLiked ? "#ccc" : "#ff4500";
        countSpan.textContent = `${newLikeCount} Likes`;
        if(!isCurrentlyLiked) iconElement.classList.add('active-like');
        else iconElement.classList.remove('active-like');

        try {
            if (isCurrentlyLiked) {
                const likeDoc = await databases.listDocuments(DB_ID, LIKES_ID, [
                    Appwrite.Query.equal('post_id', postId),
                    Appwrite.Query.equal('user_id', currentUser.$id)
                ]);
                if (likeDoc.documents.length > 0) {
                    await databases.deleteDocument(DB_ID, LIKES_ID, likeDoc.documents[0].$id);
                }
            } else {
                await databases.createDocument(DB_ID, LIKES_ID, 'unique()', {
                    post_id: postId,
                    user_id: currentUser.$id
                });
            }
            await databases.updateDocument(DB_ID, POSTS_ID, postId, { likes: newLikeCount });
        } catch (err) {
            console.error("Like error:", err);
        } finally {
            isProcessingLike = false;
        }
    }

   
    function finalizeClaim() {
        alert("Bonus Claimed! Your ₦100 Airtime will be sent to " + document.getElementById('phoneInput').value + " shortly.");
        document.getElementById('airtimePopup').style.display = 'none';
        // Remove the ?newuser=true from URL so popup doesn't come back on refresh
        window.history.replaceState({}, document.title, "index.html");
    }
   // 3. RENDER FEED
    async function renderFeed() {
        const grid = document.getElementById("postsGrid");
        if (!grid || cachedPosts.length === 0) return;

        try {
            // 1. Fetch current user's likes to show orange hearts
            const likesRes = await databases.listDocuments(DB_ID, LIKES_ID, [
                Appwrite.Query.equal('user_id', currentUser.$id)
            ]);
            const myLikedIds = likesRes.documents.map(l => l.post_id);

            let html = "";
            cachedPosts.forEach((post, index) => {
                const isLiked = myLikedIds.includes(post.$id);
                const userPfp = post.pfp ? post.pfp : `https://api.dicebear.com/7.x/avataaars/svg?seed=${post.user_id}`;
                const profileLink = `profile.html?id=${post.user_id}`;

                const mediaHtml = post.type === "video"

                            <i id="icon-${post.$id}" class="fa-solid fa-volume-xmark" style="font-size: 14px;"></i>
                        </button>
                       </div>`
                    : `<img src="${post.url}" class="responsive-media">`;

                html += `
                <div class="post" id="post-${post.$id}">
                    <div class="post-image" ondblclick="handleLike('${post.$id}', this.parentElement.querySelector('.fa-fire'))">
                        ${mediaHtml}
                    </div>
                    <div class="post-details">
                        <div style="display: flex; align-items: flex-start; margin-bottom: 10px;">
                            <a href="${profileLink}" style="text-decoration: none; display: flex; align-items: center; cursor: pointer;">
                                <img src="${userPfp}" class="post-profile-icon" style="width: 38px; height: 38px; border-radius: 50%; border: 2px solid #26ff00; margin-right: 12px;">
                                <div style="flex-grow: 1;">
                                    <div class="post-user" style="color: #333; font-weight: bold;">@${post.username || 'User'}</div>
                                    <div class="post-caption" style="font-size: 13px; color: #444;">${post.caption || ''}</div>
                                </div>
                            </a>
                        </div>
                        
                        <div class="interaction-bar" style="display: flex; align-items: center; margin-bottom: 8px;">
                            <i class="fa-solid fa-fire" 
                               style="color: ${isLiked ? '#ff4500' : '#ccc'}; cursor: pointer; font-size: 22px;"

                            <i class="fa-regular fa-comment" style="margin-left: 15px; cursor: pointer; font-size: 22px;" onclick="openComments('${post.$id}')"></i>

    document.querySelectorAll('.user-video').forEach(vid => {

    });

        } catch (error) {
            console.error("Render Error:", error);

    }

    // Helper function to keep renderFeed clean
    async function loadPreviews() {
        cachedPosts.forEach(async (post) => {
            try {
                const comms = await databases.listDocuments(DB_ID, COMMENTS_ID, [
                    Appwrite.Query.equal('post_id', post.$id),
                    Appwrite.Query.limit(1),
                    Appwrite.Query.orderDesc('$createdAt')
                ]);

                const previewDiv = document.getElementById(`preview-${post.$id}`);
                if (previewDiv && comms.documents.length > 0) {
                    const latest = comms.documents[0];
