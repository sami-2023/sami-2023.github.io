<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sami - Fast Earn</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#26ff00">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #ddd; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* === HEADER === */
    .header { background: linear-gradient(90deg, #ff0a00, #26ff00); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .logo { width: 45px; height: 45px; background: white; color: #ff0a00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; flex-shrink: 0; }
    .title-box { flex-grow: 1; text-align: center; }
    .site-name { font-size: 22px; font-weight: bold; }
    .tagline { font-size: 11px; opacity: 0.9; }

    /* === POINTS BAR === */
    .points-bar { background: white; padding: 12px 20px; display: flex; align-items: center; flex-shrink: 0; margin: 10px auto; width: 92%; max-width: 500px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: bold; }
    #currentPoints { color: #ff0a00; font-size: 14px; white-space: nowrap; }
    .progress-container { flex-grow: 1; height: 12px; background: #e9ecef; border-radius: 6px; margin: 0 15px; overflow: hidden; position: relative; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #26ff00, #ff0a00); width: 0%; border-radius: 6px; transition: width 0.6s ease; }

    /* === FAST EARN FEED === */
    .fast-feed {
      flex-grow: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      padding-bottom: 120px; /* Space for footer and banner */
      background: #000;
    }
    .fast-feed::-webkit-scrollbar { display: none; }

    .ad-slide {
      /* This calculates exactly how much room is left for the video */
      height: calc(100vh - 200px); 
      width: 100vw;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    /* === FOOTER & BANNER === */
    .bottom-banner { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #fff; z-index: 1001; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
    .footer { position: fixed; bottom: 50px; left: 0; width: 100%; height: 65px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1000; }

    .nav-item { text-decoration: none; color: #ff0a00; display: flex; flex-direction: column; align-items: center; font-size: 22px; transition: all 0.3s ease; }
    .nav-item.active { color: #26ff00; transform: scale(1.1); }
    .nav-item span { font-size: 10px; margin-top: 3px; font-weight: bold; color: inherit; }

    /* REWARD UI */
    .reward-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #26ff00;
      color: #000;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      display: none;
      z-index: 100;
      box-shadow: 0 0 15px rgba(38, 255, 0, 0.5);
    }

    .vol-btn {
      position: absolute;
      bottom: 30px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid #26ff00;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 100;
    }

    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .show-badge { display: block !important; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" style="color:white;"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="title-box">
      <h1 class="site-name">Sami</h1>
      <p class="tagline">Fast Earn Mode 🚀</p>
    </div>
    <div style="width: 20px;"></div>
  </div>

  <div class="points-bar">
    <span id="currentPoints">0 Points</span>
    <div class="progress-container">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span style="color:#26ff00; font-size: 14px;">1000 Points</span>
  </div>

  <div class="fast-feed" id="adContainer">
      </div>

  <div class="bottom-banner">
     <div style="font-size: 10px; color: #888; text-align: center;">
        <i class="fa-solid fa-rectangle-ad"></i> SPONSORED BANNER<br>
        <span style="color: #ff0a00;">Click to visit advertiser</span>
     </div>
  </div>

  <div class="footer">
    <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="upload.html" class="nav-item"><i class="fa-solid fa-camera"></i><span>Post</span></a>
    <a href="fast-earn.html" class="nav-item active"><i class="fa-solid fa-bolt"></i><span>Fast Earn</span></a>
    <a href="wallet.html" class="nav-item"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
    <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
  </div>

  <script>
  // 1. SUPABASE CONFIGURATION
  const SUPABASE_URL = 'https://zbyuzmqnzoaqsmmygwlo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpieXV6bXFuem9hcXNtbXlnd2xvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4OTg1NzQsImV4cCI6MjA4MzQ3NDU3NH0.Sm-TRpjgyft3jy62w-gL_aFdBmh27aA3W_iXr06wKio'; 
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;

  // 2. AD VIDEOS
  const adList = [
    "https://www.w3schools.com/html/mov_bbb.mp4",
    "https://www.w3schools.com/html/movie.mp4",
    "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
  ];

  // 3. INITIALIZATION
  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = "login.html";
      return;
    }
    currentUser = session.user;
    
    loadProfile();
    renderFastAds();

    // Listen for real-time points updates
    supabaseClient.channel('points-watch').on('postgres_changes', 
      { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${currentUser.id}` }, 
      payload => updatePointsUI(payload.new.points)
    ).subscribe();
  }

  async function loadProfile() {
    const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', currentUser.id).single();
    if (profile) updatePointsUI(profile.points || 0);
  }

  // 4. RENDER VIDEOS (Loop removed so 'onended' triggers)
  function renderFastAds() {
    const container = document.getElementById('adContainer');
    container.innerHTML = adList.map((src, index) => `
      <div class="ad-slide" data-ad-idx="${index}" data-earned="false">
        <div id="badge${index}" class="reward-badge">✓ +2 PTS EARNED</div>
        <video id="vid${index}" src="${src}" playsinline muted></video>
        <button class="vol-btn" onclick="toggleMute(${index})">
          <i id="icon${index}" class="fa-solid fa-volume-xmark"></i>
        </button>
      </div>
    `).join('');
    startObserver();
  }

  // 5. VIDEO OBSERVER
  function startObserver() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        const idx = video.id.replace('vid', '');
        const slide = video.parentElement;

        if (entry.isIntersecting) {
          video.currentTime = 0;
          video.play().catch(e => console.log("User must interact first"));
          
          // Triggered when video finishes
          video.onended = () => {
            if (slide.getAttribute('data-earned') !== 'true') {
              slide.setAttribute('data-earned', 'true');
              
              // 1. Earn Points
              rewardUser(idx);
              
              // 2. Autoscroll to next
              setTimeout(() => {
                const container = document.getElementById('adContainer');
                const slideHeight = slide.offsetHeight;
                container.scrollBy({ 
                  top: slideHeight, 
                  behavior: 'smooth' 
                });
              }, 1200);
            }
          };
        } else {
          video.pause();
        }
      });
    }, { threshold: 0.6 }); // Trigger slightly earlier for better reliability

    document.querySelectorAll('video').forEach(v => observer.observe(v));
  }

  // 6. IMPROVED REWARD LOGIC
  async function rewardUser(idx) {
    if (!currentUser) return;

    // Show visual feedback immediately
    const badge = document.getElementById(`badge${idx}`);
    if (badge) badge.classList.add('show-badge');

    try {
      // Get fresh points
      const { data: profile, error: fetchError } = await supabaseClient
        .from('profiles')
        .select('points')
        .eq('id', currentUser.id)
        .single();

      if (fetchError) throw fetchError;

      const newTotal = (profile.points || 0) + 2;

      // Update Supabase
      const { error: updateError } = await supabaseClient
        .from('profiles')
        .update({ points: newTotal })
        .eq('id', currentUser.id);

      if (updateError) throw updateError;
      
      console.log("Points successfully added!");

    } catch (err) {
      console.error("Reward system error:", err.message);
    }
  }

  function updatePointsUI(points) {
    const ptsElement = document.getElementById("currentPoints");
    if (ptsElement) ptsElement.textContent = points + " Points";
    
    const fill = document.getElementById("progressFill");
    if (fill) fill.style.width = Math.min((points / 1000) * 100, 100) + "%";
  }

  function toggleMute(idx) {
    const v = document.getElementById(`vid${idx}`);
    const i = document.getElementById(`icon${idx}`);
    v.muted = !v.muted;
    i.className = v.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
  }

  init();
</script>
</body>
</html>
