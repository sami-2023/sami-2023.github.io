<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sami - Wallet</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#26ff00">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f9f9f9; min-height: 100vh; padding-bottom: 130px; overflow-y: auto; }

    /* === HEADER === */
    .header { background: linear-gradient(90deg, #ff0a00, #26ff00); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; }
    .logo img { width: 45px; height: 45px; background: white; color: #ff0a00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
    .title-box { flex-grow: 1; text-align: center; }

    /* === WALLET CARD === */
    .wallet-card {
      background: #fff;
      margin: 20px auto;
      width: 92%;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }
    .balance-label { font-size: 14px; color: #888; margin-bottom: 5px; }
    .balance-amount { font-size: 36px; font-weight: bold; color: #333; margin-bottom: 15px; }
    .cash-value { color: #26ff00; font-weight: bold; font-size: 18px; margin-bottom: 20px; }

    /* Container for the button to hold the progress */
.withdraw-container {
    width: 92%;
    margin: 10px auto;
    position: relative;
}

.withdraw-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 16px;
    position: relative;
    overflow: hidden; /* Important to clip the progress fill */
    transition: all 0.4s ease;
    z-index: 1;
    background: rgba(255, 10, 0, 0.1); /* Faint background */
    color: rgba(255, 10, 0, 0.4);      /* Faint text */
}

/* The Progress Fill Layer */
.btn-progress-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%; /* Controlled by JS */
    background: rgba(255, 10, 0, 0.2); /* Slightly darker faint red */
    transition: width 0.5s ease;
    z-index: -1;
}

/* Red State when points are complete */
.withdraw-btn.ready {
    background: #ff0a00;
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 10, 0, 0.4);
}
    /* === HISTORY SECTION === */
    .history-section {
      flex-grow: 1;
      background: white;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      padding: 25px;
      overflow-y: auto;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.02);
    }
    .history-title { font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .item-info { display: flex; align-items: center; gap: 12px; }
    .item-icon { width: 40px; height: 40px; border-radius: 10px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #ff0a00; }
    .item-name { font-weight: bold; font-size: 14px; }
    .item-date { font-size: 11px; color: #aaa; }
    .item-points { color: #26ff00; font-weight: bold; }

    /* === FOOTER === */
    .footer { height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; }
    .footer {
      position: fixed;
      bottom: 50px;
      left: 0;
      width: 100%;
      height: 70px;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #ddd;
      z-index: 1000;
    }

    .nav-item { text-decoration: none; color: #ff0a00; display: flex; flex-direction: column; align-items: center; font-size: 22px; }
    .nav-item.active { color: #26ff00; }
    .nav-item span { font-size: 10px; margin-top: 3px; font-weight: bold; color: inherit; }
    .ad-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: white;
      z-index: 1000;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-item {
      text-decoration: none;
      color: #ff0a00;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 22px;
      transition: all 0.3s ease;
    }

    .nav-item.active { color: #26ff00; transform: scale(1.1); }
    .nav-item span { font-size: 10px; margin-top: 3px; font-weight: bold; color: inherit; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo"><img src="images\s.png" alt="logo"></div>
    <div class="title-box">
      <h1 style="font-size: 20px;">My Wallet</h1>
    </div>
    <div style="width: 45px;"></div>
  </div>

  <div class="wallet-card">
    <p class="balance-label">Total Earnings</p>
    <p class="balance-amount" id="totalPoints">0 Pts</p>
    <p class="cash-value" id="cashValue">≈ $0.00</p>
    <button class="withdraw-btn" id="withdrawBtn" onclick="requestWithdrawal()">WITHDRAW NOW</button>
    <p style="font-size: 10px; color: #999; margin-top: 10px;">Minimum withdrawal: 1000 Points</p>
  </div>
  


<style>
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0px rgba(255, 167, 38, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(255, 167, 38, 0); }
    100% { box-shadow: 0 0 0 0px rgba(255, 167, 38, 0); }
  }
</style>

  <div class="history-section">
    <div class="history-title">
      <span>Earnings History</span>
      <i class="fa-solid fa-clock-rotate-left" style="color:#ccc"></i>
    </div>
    <div style="background: linear-gradient(135deg, #26ff00, #1eb300); padding: 20px; border-radius: 15px; color: white; margin: 20px 0; text-align: center;">
    <p style="font-size: 12px; opacity: 0.9;">Referral Earnings</p>
    <h2 id="refEarningsText" style="font-size: 32px; margin: 5px 0;">₦0.00</h2>
    <button onclick="requestWithdrawal()" style="background: white; color: #1eb300; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; margin-top: 10px;">Withdraw to Bank</button>
</div>
<div id="withdrawModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; padding:20px;">
    <div style="background:white; width:100%; max-width:400px; padding:25px; border-radius:20px; text-align:center;">
        <h3 style="color:#1eb300; margin-bottom:15px;">Withdraw Earnings</h3>
        <p style="font-size:12px; color:#666; margin-bottom:20px;">Minimum withdrawal: ₦1,000</p>

        <input type="text" id="bankName" placeholder="Bank Name (e.g. OPay, Kuda)" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
        <input type="number" id="accNumber" placeholder="Account Number" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
        <input type="text" id="accName" placeholder="Account Name" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
        
        <button onclick="submitWithdrawal()" id="withdrawBtn" style="width:100%; background:#26ff00; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">SUBMIT REQUEST</button>
        <button onclick="closeWithdrawModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
</div>
    <div id="historyList">
      <div class="history-item">
        <div class="item-info">
          <div class="item-icon"><i class="fa-solid fa-bolt"></i></div>
          <div>
            <p class="item-name">Fast Earn Bonus</p>
            <p class="item-date">Just now</p>
          </div>
        </div>
        <p class="item-points">+2 Pts</p>
      </div>
    </div>
  </div>
   <div class="ad-banner">
   <p style="font-size:10px; color:#999;">ADVERTISEMENT</p>
</div>

  <div class="footer">
    <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
   
    <a href="upload.html" class="nav-item"><i class="fa-solid fa-camera"></i><span>Post</span></a>
     
    <a href="wallet.html" class="nav-item active"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
     <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>

<script>
  // 2. Configuration
  const sdk = new Appwrite.Client();
  sdk
    .setEndpoint('https://fra.cloud.appwrite.io/v1')
    .setProject('69930a880011dec1e960'); // Replace with your Project ID

  const account = new Appwrite.Account(sdk);
  const databases = new Appwrite.Databases(sdk);

  // Replace with your actual IDs
  const DB_ID = '69930af300230e5efc4d';
  const PROFILES_ID = 'profiles';
  const WITHDRAWALS_ID = 'withdrawals_request'; // Collection for history

  let currentUser = null;
  let userPoints = 0;
  let currentEarnings = 0;
  let userProfile = null;

  async function init() {
    try {
      // Check if logged in
      currentUser = await account.get();
      
      await loadWallet();
      await loadEarningHistory();

      // Appwrite Real-time (Optional but recommended)
      sdk.subscribe(`databases.${DB_ID}.collections.${PROFILES_ID}.documents.${currentUser.$id}`, response => {
        if (response.events.includes("databases.*.updated")) {
          userPoints = response.payload.points;
          currentEarnings = response.payload.referral_earnings;
          updateWalletDisplay();
        }
      });

    } catch (err) {
      console.log("Not logged in, redirecting...");
      window.location.href = "login.html";
    }
  }

  async function loadWallet() {
    try {
      const profile = await databases.getDocument(DB_ID, PROFILES_ID, currentUser.$id);
      userProfile = profile;
      userPoints = profile.points || 0;
      currentEarnings = profile.referral_earnings || 0;
      updateWalletDisplay();
    } catch (err) {
      console.error("Error loading wallet:", err.message);
    }
  }

  function updateWalletDisplay() {
    const ptsEl = document.getElementById("totalPoints");
    const cashEl = document.getElementById("cashValue");
    const pointsText = document.getElementById("pointsText");
    const refEarningsText = document.getElementById('refEarningsText');
    const btn = document.getElementById("withdrawBtn");
    
    if (ptsEl) ptsEl.textContent = userPoints + " Pts";
    if (pointsText) pointsText.textContent = userPoints;
    
    if (cashEl) {
      // 1000 points = $5 logic
      const dollars = ((userPoints / 1000) * 5).toFixed(2);
      cashEl.textContent = "≈ $" + dollars;
    }

    if (refEarningsText) {
      refEarningsText.textContent = "₦" + (currentEarnings || 0);
    }

    if (btn) {
      if (userPoints < 1000) {
        btn.disabled = true;
        btn.textContent = "NEED " + (1000 - userPoints) + " MORE PTS";
        btn.style.background = "rgba(255, 10, 0, 0.15)";
      } else {
        btn.disabled = false;
        btn.textContent = "WITHDRAW NOW";
        btn.style.background = "#ff0a00";
      }
    }
  }

  // --- WITHDRAWAL ACTIONS ---

  async function requestWithdrawal() {
    if (currentEarnings < 100) {
        alert("You need at least ₦100 in Referral Earnings to withdraw cash.");
        return;
    }
    document.getElementById('withdrawModal').style.display = 'flex';
  }

  async function submitWithdrawal() {
    const bank = document.getElementById('bankName').value;
    const num = document.getElementById('accNumber').value;
    const name = document.getElementById('accName').value;
    const btn = document.getElementById('withdrawBtn');

    if (!bank || !num || !name) {
        alert("Please fill all bank details.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Processing...";

    try {
        // Create withdrawal request in Appwrite
        await databases.createDocument(DB_ID, WITHDRAWALS_ID, 'unique()', {
            user_id: currentUser.$id,
            username: userProfile.username,
            amount: currentEarnings,
            bank_name: bank,
            account_number: num,
            account_name: name,
            status: 'pending',
            created_at: new Date().toISOString()
        });

        // Reset referral earnings in Profile
        await databases.updateDocument(DB_ID, PROFILES_ID, currentUser.$id, {
            referral_earnings: 0
        });

        alert(`Success! Your ₦${currentEarnings} withdrawal request has been sent.`);
        location.reload();
    } catch (err) {
        alert("Error: " + err.message);
        btn.disabled = false;
    }
  }
  const AIRTIME_ID = 'withdrawals'; // Your Airtime/Bonus collection

 async function loadEarningHistory() {
    const historyList = document.getElementById("historyList");
    if (!historyList) return;

    try {
        // 2. Fetch from BOTH collections at the same time
        const [bankRes, airtimeRes] = await Promise.all([
            databases.listDocuments(DB_ID, WITHDRAWALS_ID, [
                Appwrite.Query.equal('user_id', currentUser.$id)
            ]),
            databases.listDocuments(DB_ID, AIRTIME_ID, [
                Appwrite.Query.equal('user_id', currentUser.$id)
            ])
        ]);

        // 3. Combine the lists and sort by date
        const allLogs = [...bankRes.documents, ...airtimeRes.documents].sort((a, b) => 
            new Date(b.$createdAt) - new Date(a.$createdAt)
        );

        if (allLogs.length === 0) {
            historyList.innerHTML = "<p style='text-align:center; color:#888; margin-top:20px;'>No history yet</p>";
            return;
        }

        historyList.innerHTML = allLogs.map(item => {
            // Check if this item is from the Airtime collection
            const isAirtime = item.phone_number !== undefined; 
            const isPaid = item.status === 'Paid' || item.status === 'completed';
            const statusColor = isPaid ? '#26ff00' : '#ffaa00';
            const statusIcon = isPaid ? 'fa-check-circle' : 'fa-clock';

            return `
              <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; border-left: 5px solid ${statusColor}; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <div style="display:flex; align-items:center;">
                   <i class="fa-solid ${isAirtime ? 'fa-gift' : 'fa-university'}" style="margin-right:12px; color:#ff0a00; font-size:18px;"></i>
                   <div>
                      <p style="font-weight:bold; margin:0; font-size:14px;">
                        ${isAirtime ? 'Sign-up Airtime Bonus' : 'Bank Withdrawal'}
                      </p>
                      <p style="font-size:11px; color:${statusColor}; margin:0; font-weight:bold;">
                        <i class="fa-solid ${statusIcon}"></i> ${item.status.toUpperCase()}
                      </p>
                   </div>
                </div>
                <div style="text-align:right;">
                  <p style="font-weight:bold; margin:0; color:#333;">
                    ${isAirtime ? 'FREE' : '₦' + item.amount}
                  </p>
                  <p style="font-size:10px; color:#aaa;">${new Date(item.$createdAt).toLocaleDateString()}</p>
                </div>
              </div>
            `;
        }).join('');
    } catch (e) {
        console.error("History error:", e);
        historyList.innerHTML = "<p style='text-align:center; color:red;'>Make sure both collections have 'user_id' indexes.</p>";
    }
}

  init();
</script>
</body>
</html>
